name: Skeleton Health

on:
  pull_request:
  push:
    branches:
      - main
      - init/non-authoritative-skeleton
      - python-deterministic-core-v1
      - architect-to-ce-transition-v1
      - project-gate-prompt-02-behavioral-coverage
      - project-gate-prompt-03-runner-boundary
      - project-gate-prompt-04-ce-to-builder
      - fix/prompt-05-foundation-reconciliation
  workflow_dispatch:
    inputs:
      expected_head_sha:
        description: Exact commit SHA that this dispatched run must validate.
        required: true
        type: string

permissions:
  contents: read

jobs:
  skeleton:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact Project Gate source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact Project Gate PR head
        if: github.event_name == 'pull_request'
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Verify dispatched exact head
        if: github.event_name == 'workflow_dispatch'
        env:
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
          TESTED_SHA: ${{ github.sha }}
        run: test "$TESTED_SHA" = "$EXPECTED_HEAD_SHA"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: .python-version

      - name: Verify uv lockfile
        run: uv lock --check

      - name: Install package
        run: uv sync --locked --extra dev --extra ui

      - name: Verify GitHub Action pins
        run: uv run python scripts/check-github-action-pinning.py

      - name: Verify workflow permissions
        run: uv run python scripts/check-workflow-permissions.py

      - name: Verify capability truth
        run: uv run python scripts/check-capability-truth.py

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Verify required docs exist
        run: |
          test -f README.md
          test -f docs/ROLE_BOUNDARY_MAP.md
          test -f docs/CROSS_REPO_INTEGRATION_SPEC.md
          test -f docs/VALIDATION_AND_EVIDENCE_POLICY.md
          test -f docs/PROMPT_01_IMPLEMENTATION_REPORT.md

      - name: Verify package metadata
        run: |
          test -f pyproject.toml
          test -f uv.lock
          test -f package.json

      - name: Run skeleton status
        run: npm run status

      - name: Run skeleton validation
        run: npm run validate

      - name: Verify no specialist canonical schema files exist
        run: |
          test ! -e schemas/architect-stage-payload.v1.schema.json
          test ! -e schemas/constructability-result.v1.schema.json
          test ! -e schemas/builder-executable-package.v1.schema.json
          test ! -e schemas/responsive-result.v1.schema.json

      - name: Record exact tested head
        run: echo "Skeleton validated source head ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  python-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact Project Gate source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: EV4-Project-Gate
          persist-credentials: false

      - name: Assert exact Project Gate PR head
        if: github.event_name == 'pull_request'
        working-directory: EV4-Project-Gate
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Checkout Architect pinned contract repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Architect-Repo
          ref: be9bdea9ae246b1587043f2582c1a950ea2a6ec5
          path: EV4-Architect-Repo
          persist-credentials: false

      - name: Checkout CE pinned contract repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Constructability-Engineer-Repo
          ref: 6650c31304e5a0472b276c36018c1df8f42ac983
          path: EV4-Constructability-Engineer-Repo
          persist-credentials: false

      - name: Checkout CE pinned CE-to-Builder repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Constructability-Engineer-Repo
          ref: c4e2da312428ef0b04d9cb1ca551102f1ce1b397
          path: EV4-Constructability-Engineer-Repo-Prompt04
          persist-credentials: false

      - name: Checkout Builder pinned CE-to-Builder repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Builder-Assistant-Repo
          ref: 7c7163ec607b613015f19bd5761ed8f4fdde99b0
          path: EV4-Builder-Assistant-Repo-Prompt04
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: EV4-Project-Gate/.python-version

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Verify uv lockfile
        working-directory: EV4-Project-Gate
        run: uv lock --check

      - name: Install package
        working-directory: EV4-Project-Gate
        run: uv sync --locked --extra dev --extra ui

      - name: Service layer tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/service

      - name: KROAD-011 intake, Final Gate, receipt, and governance tests
        working-directory: EV4-Project-Gate
        run: |
          uv run pytest \
            tests/architect \
            tests/kroad011 \
            tests/test_final_gate.py \
            tests/test_kroad011_receipt.py \
            tests/test_boundary.py \
            tests/test_evidence_precheck.py \
            tests/test_hash_vectors.py \
            tests/test_cli_final_gate_kernel_repo.py \
            tests/test_execution_ledger.py \
            tests/test_publication_governance.py \
            tests/test_phase6_manifest.py \
            tests/governance

      - name: Operator UI adapter tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/ui

      - name: CLI and bundle tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/test_cli.py tests/test_bundle_validator.py tests/test_schema_registry.py

      - name: Personal-use package tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/personal_use

      - name: Architect-to-CE transition tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/test_architect_to_ce_transition.py tests/test_transition_result_schema.py

      - name: Producer dispatch and adversarial tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/producer_integration tests/adversarial

      - name: Prompt 01 unit tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/unit

      - name: Static runner-boundary scanner
        working-directory: EV4-Project-Gate
        run: uv run python scripts/check-runner-boundary.py

      - name: Runner tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/runners

      - name: CE-to-Builder transition pytest
        working-directory: EV4-Project-Gate
        run: |
          set -o pipefail
          uv run pytest tests/ce-to-builder/test-ce-to-builder-transition.py 2>&1 | tee c2b-pytest.log

      - name: Prompt-05 transition tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/transitions

      - name: Upload CE-to-Builder pytest log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: c2b-pytest-log
          path: EV4-Project-Gate/c2b-pytest.log
          if-no-files-found: ignore

      - name: Progress tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/progress

      - name: Runner boundary tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/boundary

      - name: Behavioral coverage validator
        working-directory: EV4-Project-Gate
        run: |
          uv run python scripts/validate-behavioral-rule-coverage.py docs/BEHAVIORAL_RULE_COVERAGE.md
          uv run ev4-transition coverage validate docs/BEHAVIORAL_RULE_COVERAGE.md

      - name: Behavioral fixture validation
        working-directory: EV4-Project-Gate
        run: |
          uv run ev4-transition validate fixtures/behavioral/valid/architect-stage-bundle.behavioral-valid.v1.json
          set +e
          uv run ev4-transition validate fixtures/behavioral/invalid/missing-behavioral-coverage.v1.json
          status=$?
          test "$status" -eq 1

      - name: Verify external contract lock hashes
        working-directory: EV4-Project-Gate
        env:
          EV4_ARCHITECT_REPO: ${{ github.workspace }}/EV4-Architect-Repo
          EV4_CE_REPO: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo
        run: uv run python scripts/verify-contract-lock.py

      - name: Compute CE-to-Builder lock hashes
        working-directory: EV4-Project-Gate
        env:
          EV4_CE_REPO_PROMPT04: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo-Prompt04
          EV4_BUILDER_REPO_PROMPT04: ${{ github.workspace }}/EV4-Builder-Assistant-Repo-Prompt04
        run: |
          uv run python scripts/compute-c2b-lock.py \
            --lock contracts/locks/ce-to-builder-transition.v1.lock.json \
            --ce-repo "$EV4_CE_REPO_PROMPT04" \
            --builder-repo "$EV4_BUILDER_REPO_PROMPT04" \
            --output c2b-lock.computed.json

      - name: Upload CE-to-Builder computed lock
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: c2b-lock-computed
          path: EV4-Project-Gate/c2b-lock.computed.json

      - name: CE-to-Builder lock verification
        working-directory: EV4-Project-Gate
        env:
          EV4_CE_REPO_PROMPT04: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo-Prompt04
          EV4_BUILDER_REPO_PROMPT04: ${{ github.workspace }}/EV4-Builder-Assistant-Repo-Prompt04
        run: |
          set -o pipefail
          uv run python scripts/verify-c2b-lock.py \
            --lock contracts/locks/ce-to-builder-transition.v1.lock.json \
            --ce-repo "$EV4_CE_REPO_PROMPT04" \
            --builder-repo "$EV4_BUILDER_REPO_PROMPT04" 2>&1 | tee c2b-lock-verify.log

      - name: Upload CE-to-Builder lock verify log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: c2b-lock-verify-log
          path: EV4-Project-Gate/c2b-lock-verify.log
          if-no-files-found: ignore

      - name: CE-to-Builder live owner tool smoke
        working-directory: EV4-Project-Gate
        env:
          EV4_CE_REPO_PROMPT04: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo-Prompt04
          EV4_BUILDER_REPO_PROMPT04: ${{ github.workspace }}/EV4-Builder-Assistant-Repo-Prompt04
        run: |
          set -o pipefail
          uv run python scripts/ce-to-builder-smoke.py \
            --ce-repo "$EV4_CE_REPO_PROMPT04" \
            --builder-repo "$EV4_BUILDER_REPO_PROMPT04" \
            --fixture "$EV4_CE_REPO_PROMPT04/tests/role-alignment/valid/executable_visual_reference_package.json" 2>&1 | tee c2b-smoke.log

      - name: Upload CE-to-Builder smoke log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: c2b-smoke-log
          path: EV4-Project-Gate/c2b-smoke.log
          if-no-files-found: ignore

      - name: CLI smoke valid bundle
        working-directory: EV4-Project-Gate
        run: uv run ev4-transition validate fixtures/valid/architect-stage-bundle.v1.json

      - name: CLI smoke invalid array
        working-directory: EV4-Project-Gate
        run: |
          set +e
          uv run ev4-transition validate fixtures/invalid/array-input.v1.json
          status=$?
          test "$status" -eq 1

      - name: CLI smoke Persian insufficient evidence
        working-directory: EV4-Project-Gate
        run: |
          set +e
          output=$(uv run ev4-transition validate fixtures/insufficient-evidence/architect-stage-bundle.v1.json --format persian)
          status=$?
          printf '%s\n' "$output"
          test "$status" -eq 2
          printf '%s' "$output" | grep 'شواهد کافی نیست'

      - name: Official Architect validator fixture suite
        working-directory: EV4-Architect-Repo
        env:
          PROJECT_GATE_PYTHON: ${{ github.workspace }}/EV4-Project-Gate/.venv/bin/python
        run: '"$PROJECT_GATE_PYTHON" scripts/check-architect-stage-payload.py'

      - name: Official CE validator fixture suite
        working-directory: EV4-Constructability-Engineer-Repo
        env:
          PROJECT_GATE_PYTHON: ${{ github.workspace }}/EV4-Project-Gate/.venv/bin/python
        run: '"$PROJECT_GATE_PYTHON" scripts/validate-ce-architect-stage-intake.py'

      - name: Generated Architect-to-CE transition smoke and CE binding
        working-directory: EV4-Project-Gate
        env:
          EV4_ARCHITECT_REPO: ${{ github.workspace }}/EV4-Architect-Repo
          EV4_CE_REPO: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo
        run: uv run python scripts/transition-smoke.py --architect-repo "$EV4_ARCHITECT_REPO" --ce-repo "$EV4_CE_REPO"

      - name: Current-head Architect export to standalone CE input
        working-directory: EV4-Project-Gate
        env:
          EV4_ARCHITECT_REPO: ${{ github.workspace }}/EV4-Architect-Repo
          EV4_CE_REPO: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo
        run: |
          uv run python scripts/pg-a2c-current-head-smoke.py \
            --architect-repo "$EV4_ARCHITECT_REPO" \
            --ce-repo "$EV4_CE_REPO" \
            --evidence-dir pg-a2c-exact-head-evidence

      - name: Upload PG-A2C exact-head evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pg-a2c-exact-head-${{ github.event.pull_request.head.sha || github.sha }}
          path: EV4-Project-Gate/pg-a2c-exact-head-evidence
          if-no-files-found: error
          retention-days: 14

      - name: Record exact tested head
        run: echo "Python core validated source head ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  repair-invariants:
    runs-on: ubuntu-latest
    env:
      EVIDENCE_DIR: ${{ runner.temp }}/ev4-gui-producer-repair-evidence
    steps:
      - name: Checkout exact Project Gate source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact tested head
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || inputs.expected_head_sha || github.sha }}
        run: |
          actual_head="$(git rev-parse HEAD)"
          test "$actual_head" = "$EXPECTED_HEAD_SHA"
          mkdir -p "$EVIDENCE_DIR"
          printf '%s\n' "$actual_head" > "$EVIDENCE_DIR/tested-head-sha.txt"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: .python-version

      - name: Verify lock and install package
        run: |
          uv lock --check
          uv sync --locked --extra dev --extra ui

      - name: Focused architectural and adversarial tests
        shell: bash
        run: |
          set -o pipefail
          uv run pytest \
            tests/ui \
            tests/service \
            tests/producer_integration \
            tests/boundary/test_runner_boundary_static.py \
            tests/boundary/test_import_purity.py \
            tests/boundary/test_native_ui_runners.py \
            tests/boundary/test_evidence_packaging.py \
            tests/packaging/test_runner_packaging.py \
            tests/test_cli_final_gate_kernel_repo.py \
            -vv --junitxml="$EVIDENCE_DIR/focused-junit.xml" \
            2>&1 | tee "$EVIDENCE_DIR/focused-tests.log"

      - name: Full repository tests
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -vv --junitxml="$EVIDENCE_DIR/full-junit.xml" \
            2>&1 | tee "$EVIDENCE_DIR/full-tests.log"

      - name: Build Gradio demo without launch
        run: |
          uv run python -c "from ev4_transition.ui.app import build_demo; build_demo(); print('UI_BUILD_OK')" \
            | tee "$EVIDENCE_DIR/ui-build.log"

      - name: Build installable wheel
        run: |
          mkdir -p "$EVIDENCE_DIR/dist"
          uv build --wheel --out-dir "$EVIDENCE_DIR/dist" --python "$(command -v python)" --no-python-downloads
          ls -l "$EVIDENCE_DIR/dist" | tee "$EVIDENCE_DIR/wheel-build.log"

      - name: Clean-install packaged UI and runner modules
        shell: bash
        run: |
          CLEAN_VENV="$RUNNER_TEMP/ev4-clean-install"
          uv venv "$CLEAN_VENV"
          wheel_path="$(find "$EVIDENCE_DIR/dist" -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$wheel_path"
          uv pip install --python "$CLEAN_VENV/bin/python" "$wheel_path" "gradio>=4,<6"
          (
            cd "$RUNNER_TEMP"
            "$CLEAN_VENV/bin/python" - <<'PY'
          from ev4_transition.runners.native_dialog import select_directory
          from ev4_transition.runners.open_output_folder import open_directory
          from ev4_transition.ui.app import build_demo

          demo = build_demo()
          assert demo is not None
          assert select_directory is not None
          assert open_directory is not None
          print("CLEAN_INSTALL_IMPORT_OK")
          PY
          ) | tee "$EVIDENCE_DIR/clean-install.log"

      - name: Package exact-head source evidence outside checkout
        if: always()
        env:
          TESTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || inputs.expected_head_sha || github.sha }}
        run: |
          mkdir -p "$EVIDENCE_DIR/source"
          uv run python scripts/package-ci-evidence.py \
            --source "$GITHUB_WORKSPACE" \
            --archive "$EVIDENCE_DIR/source/pr-head-source.tar.gz" \
            --manifest "$EVIDENCE_DIR/source/source-evidence-manifest.json" \
            --tested-head-sha "$TESTED_HEAD_SHA" \
            | tee "$EVIDENCE_DIR/source/source-packaging.log"
          test -s "$EVIDENCE_DIR/source/pr-head-source.tar.gz"
          test -s "$EVIDENCE_DIR/source/source-evidence-manifest.json"

      - name: Upload exact-head repair evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gui-producer-runtime-repair-evidence-${{ github.event.pull_request.head.sha || github.sha }}
          path: ${{ env.EVIDENCE_DIR }}
          if-no-files-found: error
          retention-days: 14
