name: PG-C2B Generation

on:
  pull_request:
    paths:
      - "src/ev4_transition/**"
      - "contracts/**"
      - "tests/**"
      - "scripts/**"
      - ".github/workflows/pg-c2b-generation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact Project Gate head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: EV4-Project-Gate
          persist-credentials: false

      - name: Assert exact PR head
        if: github.event_name == 'pull_request'
        run: test "$(git -C EV4-Project-Gate rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Checkout current CE owner revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Constructability-Engineer-Repo
          ref: 6650c31304e5a0472b276c36018c1df8f42ac983
          path: EV4-Constructability-Engineer-Repo
          persist-credentials: false

      - name: Checkout current Builder owner revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Builder-Assistant-Repo
          ref: b599c000118dcbe77572d6f387da5da0f46d1f91
          path: EV4-Builder-Assistant-Repo
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: EV4-Project-Gate/.python-version

      - name: Install Project Gate
        working-directory: EV4-Project-Gate
        run: uv sync --locked --extra dev --extra ui

      - name: Generate current C2B lock and CE adoption registry
        working-directory: EV4-Project-Gate
        env:
          CE_REPO: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo
          BUILDER_REPO: ${{ github.workspace }}/EV4-Builder-Assistant-Repo
        run: |
          mkdir -p generated-pg-c2b
          uv run python scripts/compute-ce-to-builder-lock.py \
            --ce-repo "$CE_REPO" \
            --builder-repo "$BUILDER_REPO" \
            --output generated-pg-c2b/ce-to-builder-transition.v1.lock.json
          uv run python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path.cwd()
          ce = Path(os.environ["CE_REPO"])
          registry_path = root / "contracts/producer-adoption/ev4-producer-adoption-set.v1.json"
          registry = json.loads(registry_path.read_text(encoding="utf-8"))
          record = next(item for item in registry["producers"] if item["stage"] == "ce")
          commit = "6650c31304e5a0472b276c36018c1df8f42ac983"
          record["audit_repair_pr"] = 37
          record["pr_head_sha"] = "677ff32edc8bca3e4c4156031d72b89a9c0a26d5"
          record["runtime_pin"]["merged_commit_sha"] = commit
          record["runtime_authority"] = {
              "active_payload_schema": "schemas/ce_stage_payload.v1.schema.json",
              "exporter_command": "ev4-ce-project-gate-export --payload <ce-stage-payload.json> --source-intake <source-intake.json> --source-bundle <source-bundle.json> --run-id <run-id> --output ce-project-gate.json",
              "exporter_path": "scripts/export-ce-project-gate.py",
              "selection_reason": "Current merged main revision contains the CE exporter and the CE-02 post-merge audit repairs.",
              "semantic_validator_path": "validator/project_gate_export.py",
          }
          records = []
          for rel in ["schemas/ce_stage_payload.v1.schema.json", "validator/project_gate_export.py"]:
              digest = hashlib.sha256((ce / rel).read_bytes()).hexdigest()
              records.append({
                  "commit_sha": commit,
                  "method": f"sha256 exact bytes at {commit}",
                  "notes": ["current PG-C2B producer authority"],
                  "path": rel,
                  "sha256": digest,
                  "status": "verified",
              })
          record["hash_verification"] = {
              "all_required_hashes_verified": True,
              "method": "exact_current_owner_file_bytes",
              "records": records,
          }
          record["pr_head_ci_provenance"] = [
              {
                  "commit_sha": "677ff32edc8bca3e4c4156031d72b89a9c0a26d5",
                  "conclusion": "success",
                  "exact_head_evidence": True,
                  "status": "completed",
                  "url": "https://github.com/rezahh107/EV4-Constructability-Engineer-Repo/actions/runs/29563815214",
                  "workflow_name": "validate-fixtures",
              },
              {
                  "commit_sha": "677ff32edc8bca3e4c4156031d72b89a9c0a26d5",
                  "conclusion": "success",
                  "exact_head_evidence": True,
                  "status": "completed",
                  "url": "https://github.com/rezahh107/EV4-Constructability-Engineer-Repo/actions/runs/29563815485",
                  "workflow_name": "verify-project-gate-contract",
              },
          ]
          output = root / "generated-pg-c2b/ev4-producer-adoption-set.v1.json"
          output.write_text(json.dumps(registry, ensure_ascii=False, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Syntax check changed Python modules
        working-directory: EV4-Project-Gate
        run: uv run python -m py_compile src/ev4_transition/producer_integration/c2b_dispatch.py src/ev4_transition/producer_integration/intake.py src/ev4_transition/cli.py src/ev4_transition/transitions/ce_to_builder.py

      - name: Upload generated PG-C2B evidence and source snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pg-c2b-generation-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            EV4-Project-Gate/generated-pg-c2b
            EV4-Project-Gate/src
            EV4-Project-Gate/tests
            EV4-Project-Gate/.github/workflows/validate.yml
            EV4-Project-Gate/contracts/producer-adoption/ev4-producer-adoption-set.v1.json
            EV4-Project-Gate/fixtures/producer-emitted/valid/ce-export.v1.json
          if-no-files-found: error
          retention-days: 7
