name: Temporary Pytest Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  pytest-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Print focused pytest failures
        shell: bash
        env:
          TESTED_HEAD: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init --quiet .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --quiet --depth=1 origin "$TESTED_HEAD"
          git checkout --quiet --detach FETCH_HEAD
          python -m pip install --quiet uv==0.7.22
          uv sync --locked --extra dev --extra ui --quiet
          set +e
          uv run pytest -q --tb=short --maxfail=20 > "$RUNNER_TEMP/pytest.log" 2>&1
          pytest_status=$?
          set -e
          echo "PYTEST_STATUS=$pytest_status"
          echo "PYTEST_FAILURE_TAIL_START"
          tail -n 120 "$RUNNER_TEMP/pytest.log"
          echo "PYTEST_FAILURE_TAIL_END"
          exit 0
