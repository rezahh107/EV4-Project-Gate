name: Temporary Pytest Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  pytest-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Isolate Architect to CE boundary failure
        shell: bash
        env:
          TESTED_HEAD: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init --quiet .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --quiet --depth=1 origin "$TESTED_HEAD"
          git checkout --quiet --detach FETCH_HEAD
          python -m pip install --quiet uv==0.7.22
          uv sync --locked --extra dev --extra ui --quiet

          architect="$RUNNER_TEMP/EV4-Architect-Repo"
          ce="$RUNNER_TEMP/EV4-Constructability-Engineer-Repo"
          git clone --quiet "https://x-access-token:${GH_TOKEN}@github.com/rezahh107/EV4-Architect-Repo.git" "$architect"
          git -C "$architect" checkout --quiet be9bdea9ae246b1587043f2582c1a950ea2a6ec5
          git clone --quiet "https://x-access-token:${GH_TOKEN}@github.com/rezahh107/EV4-Constructability-Engineer-Repo.git" "$ce"
          git -C "$ce" checkout --quiet 6650c31304e5a0472b276c36018c1df8f42ac983

          run_cmd() {
            name="$1"
            shift
            log="$RUNNER_TEMP/${name}.log"
            set +e
            "$@" > "$log" 2>&1
            status=$?
            set -e
            echo "COMMAND_STATUS ${name}=${status}"
            if [[ "$status" -ne 0 ]]; then
              echo "COMMAND_FAILURE ${name}"
              tail -n 80 "$log"
            fi
          }

          run_cmd a2c_pytest uv run pytest -q tests/test_architect_to_ce_transition.py tests/producer_integration/test_pg_a2c_io.py tests/producer_integration/test_pg_a2c_dispatch.py
          run_cmd a2c_lock uv run python scripts/verify-architect-to-ce-lock.py --architect-repo "$architect" --ce-repo "$ce"
          run_cmd a2c_smoke uv run python scripts/transition-smoke.py --architect-repo "$architect" --ce-repo "$ce"
          run_cmd architect_validator bash -lc "cd '$architect' && '$(pwd)/.venv/bin/python' scripts/check-architect-stage-payload.py"
          run_cmd ce_validator bash -lc "cd '$ce' && '$(pwd)/.venv/bin/python' scripts/validate-ce-architect-stage-intake.py"
          exit 0
