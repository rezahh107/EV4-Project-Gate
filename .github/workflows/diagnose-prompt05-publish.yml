name: Diagnose Prompt 05 Publish

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Restore merged foundation
        run: |
          git checkout origin/main -- \
            .github/workflows/status-after-merge.yml AGENTS.md README.md \
            docs/ARCHITECTURE.md docs/COMPATIBILITY_MAP.md docs/CONTRACT_INVENTORY.md \
            docs/EV4_SHARED_CONTRACTS_STATUS.md docs/IMPLEMENTATION_STATUS.yaml \
            docs/ROLE_BOUNDARY_MAP.md docs/TRANSITION_BOUNDARY_MAP.md docs/VALIDATION_STRATEGY.md \
            docs/handoffs/PROMPT-04_HANDOFF.md scripts/check-github-action-pinning.py \
            scripts/status.js scripts/update-status-after-merge.js scripts/validate.js \
            src/ev4_transition/__init__.py src/ev4_transition/cli.py \
            src/ev4_transition/data/capability-status.v1.json tests/test_cli.py

      - name: Checkout pinned Builder
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Builder-Assistant-Repo
          ref: 69a2c61edf6d06b4418ad770fcefbfdffcf275d6
          path: .owner/EV4-Builder-Assistant-Repo
          persist-credentials: false

      - name: Checkout pinned Responsive
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Responsive-Architect
          ref: df74c7ba2ffbed1a4136b5ea6be6ce30db4e161a
          path: .owner/EV4-Responsive-Architect
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Apply repair and compute lock
        run: |
          python scripts/bootstrap-prompt05-repair.py --apply
          python -m pip install -e '.[dev]'
          python scripts/compute-builder-to-responsive-lock.py \
            --builder-repo .owner/EV4-Builder-Assistant-Repo \
            --responsive-repo .owner/EV4-Responsive-Architect \
            --output contracts/locks/builder-to-responsive-transition.v1.lock.json
          rm -rf .owner

      - name: Diagnose commit and push
        id: publish
        continue-on-error: true
        run: |
          set -o pipefail
          {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git status --short
            git add -A
            git status --short
            git commit -m "Prompt-05 publish diagnostic [skip ci]"
            git push --dry-run origin HEAD:fix/prompt-05-foundation-reconciliation
          } 2>&1 | tee prompt05-publish.log

      - name: Upload publish diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prompt05-publish-diagnostic
          path: prompt05-publish.log
          retention-days: 2

      - name: Propagate result
        if: steps.publish.outcome != 'success'
        run: exit 1
