name: KROAD-011 Project Gate Intake

on:
  pull_request:
    paths:
      - ".github/workflows/kroad-011.yml"
      - "contracts/locks/kernel-decision-intake.v1.lock.json"
      - "schemas/kernel-decision-intake/**"
      - "schemas/kernel-decision-intake-result/**"
      - "scripts/compute-kernel-decision-intake-lock.py"
      - "scripts/kernel-decision-intake-bridge.mjs"
      - "src/ev4_transition/kernel_decision_dependencies.py"
      - "src/ev4_transition/kernel_decision_intake.py"
      - "src/ev4_transition/runners/kernel_decision.py"
      - "src/ev4_transition/transitions/final_gate.py"
      - "src/ev4_transition/reports/decision_receipts.py"
      - "tests/kernel_decision_intake/**"
      - "tests/transitions/test_final_gate.py"
      - "tests/reports/test_decision_receipts.py"
  push:
    branches:
      - feature/kroad-011-project-gate-intake
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semantic-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project Gate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: EV4-Project-Gate
          persist-credentials: false

      - name: Checkout pinned Decision Kernel
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Decision-Kernel
          ref: 76a82e28543ff8f0babca11b7d7dccac96b92894
          path: EV4-Decision-Kernel
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Compute immutable Kernel semantic lock
        working-directory: EV4-Project-Gate
        env:
          PYTHONPATH: src
        run: >-
          python scripts/compute-kernel-decision-intake-lock.py
          --kernel-repo "${{ github.workspace }}/EV4-Decision-Kernel"
          --output kernel-decision-intake-lock-computed.json

      - name: Upload computed semantic lock
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kernel-decision-intake-lock-computed
          path: EV4-Project-Gate/kernel-decision-intake-lock-computed.json
          if-no-files-found: error

      - name: Record exact tested head
        run: echo "KROAD-011 semantic lock computed from source head ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
