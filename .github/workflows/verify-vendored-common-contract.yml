name: Verify Vendored Project Gate Common Contract

on:
  workflow_call:
    inputs:
      lock_path:
        description: Repository-relative path to the Producer common-contract lock.
        required: false
        type: string
        default: contracts/project-gate/producer-gate-export.v1.lock.json

permissions:
  contents: read

jobs:
  verify-common-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Producer repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: producer
          persist-credentials: false

      - name: Read immutable Project Gate pin
        id: lock
        env:
          LOCK_PATH: ${{ inputs.lock_path }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          path = (Path("producer") / os.environ["LOCK_PATH"]).resolve()
          producer_root = Path("producer").resolve()
          if not path.is_relative_to(producer_root):
              raise SystemExit("lock_path must stay inside the Producer checkout")
          lock = json.loads(path.read_text(encoding="utf-8"))
          sha = ((lock.get("canonical") or {}).get("commit_sha"))
          if lock.get("lock_schema") != "project-gate-common-contract-lock.v1":
              raise SystemExit("unsupported common-contract lock schema")
          if lock.get("contract_owner") != "rezahh107/EV4-Project-Gate":
              raise SystemExit("common-contract owner drift")
          if ((lock.get("canonical") or {}).get("repository")) != "rezahh107/EV4-Project-Gate":
              raise SystemExit("canonical repository drift")
          if not isinstance(sha, str) or re.fullmatch(r"[a-f0-9]{40}", sha) is None:
              raise SystemExit("canonical.commit_sha must be an immutable lowercase 40-character commit SHA")
          verification = lock.get("verification") or {}
          if verification.get("byte_equality_required") is not True:
              raise SystemExit("exact byte equality is required")
          if verification.get("compare_against_moving_default_branch") is not False:
              raise SystemExit("moving-default-branch comparison is forbidden")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"commit_sha={sha}\n")
          PY

      - name: Checkout canonical Project Gate commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Project-Gate
          ref: ${{ steps.lock.outputs.commit_sha }}
          path: project-gate
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: project-gate/.python-version

      - name: Install deterministic verifier
        working-directory: project-gate
        run: uv sync --locked

      - name: Verify exact vendored bytes and hashes
        working-directory: project-gate
        env:
          LOCK_PATH: ${{ inputs.lock_path }}
        run: |
          set -o pipefail
          uv run python scripts/verify-vendored-common-contract.py \
            --lock "../producer/$LOCK_PATH" \
            --canonical-root . \
            --vendored-root ../producer \
            --project-gate-root . | tee common-contract-verification.json
