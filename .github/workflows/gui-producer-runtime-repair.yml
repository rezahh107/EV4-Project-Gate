name: GUI Producer Runtime Repair

on:
  pull_request:
    paths:
      - "src/ev4_transition/**"
      - "tests/**"
      - "docs/GUI_PRODUCER_A2C_OPERATOR_GUIDE.md"
      - ".github/workflows/gui-producer-runtime-repair.yml"

permissions:
  contents: read

jobs:
  repair-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: .python-version

      - name: Install locked package
        run: uv sync --locked --extra dev --extra ui

      - name: Focused repair tests
        id: focused
        shell: bash
        run: |
          set +e
          uv run pytest tests/ui tests/service tests/producer_integration -vv --junitxml=focused-junit.xml 2>&1 | tee focused-tests.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Full repository tests
        if: success()
        id: full
        shell: bash
        run: |
          set +e
          uv run pytest -vv --junitxml=full-junit.xml 2>&1 | tee full-tests.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Package exact source snapshot
        if: always()
        shell: bash
        run: tar --exclude=.git --exclude=.venv -czf pr-head-source.tar.gz .

      - name: Upload test and source evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gui-producer-runtime-repair-evidence
          path: |
            focused-tests.log
            focused-junit.xml
            full-tests.log
            full-junit.xml
            pr-head-source.tar.gz
          if-no-files-found: warn
          retention-days: 7
